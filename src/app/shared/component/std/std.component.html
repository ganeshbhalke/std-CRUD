<div class="container mt-4 ">
   <div class="row">
    <div class="col-md-4 mt-3">
        <div class="form-group">
         <label for="fname"><b>*First Name</b></label>
         <!-- <h2 class="text-center">{{isInEditMode ? 'UPDATE STD' :'ADD STD'}}</h2> -->
          <input type="text" #fname   placeholder="fname"  class="form-control" #stdName>
        </div>
        <div class="form-group">
         <label for="lname"><b>*Last Name</b></label>
          <input type="text" #lname placeholder="lname" class="form-control" #stdlName>
        </div>
        <div class="form-group">
         <label for="email "><b>*Email </b></label>
          <input type="text" #email placeholder="email" class="form-control" #stdEmail>
        </div>
        <div class="form-group">
         <label for="contact"><b>*Contact</b></label>
          <input type="text" #contact placeholder="contact" class="form-control" #stdContact>
        </div>
         
        <p *ngIf="searchstd" class="alert alert-success">{{searchstd}}</p>
        <button class="btn btn-success btn-block mb-3" *ngIf="!isInEditMode" (click)="onSubEve()">ADD STD</button>
        <button class="btn btn-warning btn-block mb-3" *ngIf="isInEditMode" (click)="onUpdate()">UPDATE STD</button>

    </div>
    <div class="col-md-8 mt-4">
        <table class="table table-bordered text-center " *ngIf="stdsArr.length > 0; else noStudent">
            <thead>
                <tr>

                    <th>SR.No</th>
                    <th>Fname</th>
                    <th>Lname</th>
                    <th>Email</th>
                    <th>Contact</th>
                    <th>Edit</th>
                    <th>Remove</th>
                </tr>

            </thead>
            
            <tbody> 
                <tr *ngFor="let gana of stdsArr; let i=index">
                    <td>{{i + 1}}</td>
                    <td>{{gana.fname}}</td>
                    <td> {{gana.lname}}</td>
                    <td>{{gana.email}}</td>
                    <td>{{gana.contact}}</td>
                    <td>
                        <button class="btn btn-outline-primary btn-sm mr-3 text-center" (click)="onEdit(gana)">Edit</button>
                    </td>
                    <td>
                <button class="btn btn-outline-danger btn-sm text-center" (click)="onRemove(i)">Remove</button>
                    </td>
                </tr>
            </tbody>

        </table>
       <ng-template #noStudent>
  <p class="alert alert-info">No Student Data added Yet!!</p>
</ng-template>

    </div>
   </div>
</div>
